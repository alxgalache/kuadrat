services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kuadrat-api
    # Bind to localhost only - nginx will handle external traffic
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file:
      - ./api/.env
    # PRODUCTION: Only mount the uploads directory, not the entire app
    volumes:
      - api_uploads:/app/uploads
    # Security: Run with limited privileges
    security_opt:
      - no-new-privileges:true
    # Restart policy for production
    restart: unless-stopped
    command: npm run start
    networks:
      - kuadrat-network
    # Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        - NEXT_PUBLIC_CART_ADDRESS_FUNC=${NEXT_PUBLIC_CART_ADDRESS_FUNC}
        - NEXT_PUBLIC_GOOGLE_PAY_ENABLED=${NEXT_PUBLIC_GOOGLE_PAY_ENABLED}
        - NEXT_PUBLIC_GOOGLE_PAY_ENV=${NEXT_PUBLIC_GOOGLE_PAY_ENV}
        - NEXT_PUBLIC_GOOGLE_PAY_MERCHANT_ID=${NEXT_PUBLIC_GOOGLE_PAY_MERCHANT_ID}
        - NEXT_PUBLIC_GOOGLE_PAY_MERCHANT_NAME=${NEXT_PUBLIC_GOOGLE_PAY_MERCHANT_NAME}
        - NEXT_PUBLIC_GOOGLE_PAY_GATEWAY=${NEXT_PUBLIC_GOOGLE_PAY_GATEWAY}
        - NEXT_PUBLIC_GOOGLE_PAY_GATEWAY_MERCHANT_ID=${NEXT_PUBLIC_GOOGLE_PAY_GATEWAY_MERCHANT_ID}
        - NEXT_PUBLIC_GOOGLE_PAY_LOCALE=${NEXT_PUBLIC_GOOGLE_PAY_LOCALE}
        - NEXT_PUBLIC_REVOLUT_LOCALE=${NEXT_PUBLIC_REVOLUT_LOCALE}
        - NEXT_PUBLIC_REVOLUT_MODE=${NEXT_PUBLIC_REVOLUT_MODE}
        - NEXT_PUBLIC_REVOLUT_PUBLIC_KEY=${NEXT_PUBLIC_REVOLUT_PUBLIC_KEY}
        - NEXT_PUBLIC_PAYMENT_TIMEOUT_MS=${NEXT_PUBLIC_PAYMENT_TIMEOUT_MS}
    image: kuadrat-client
    container_name: kuadrat-client
    # Bind to localhost only - nginx will handle external traffic
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    env_file:
      - ./client/.env.production
    # PRODUCTION: Use read-only filesystem with tmpfs for temporary files
    read_only: true
    tmpfs:
      - /tmp:size=100M,mode=1777
      - /app/.next/cache:size=200M,mode=1777
    # Security: Run with limited privileges
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - kuadrat-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  kuadrat-network:
    driver: bridge

volumes:
  api_uploads:
    driver: local
