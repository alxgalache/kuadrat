# Fail2ban filter for API abuse (too many requests)
# Copy to /etc/fail2ban/filter.d/kuadrat-api-abuse.conf

[Definition]

# Match any request to the API
failregex = ^<HOST> -.*"(GET|POST|PUT|PATCH|DELETE) /api/.*"

ignoreregex =

datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^\[]*\[({DATE})
              {^LN-BEG}
