# Fail2ban filter for vulnerability scanners targeting Kuadrat
# Copy to /etc/fail2ban/filter.d/kuadrat-scanner.conf

[Definition]

# Match requests for common scanner targets
failregex = ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE).*(\.php|\.asp|\.aspx|\.jsp|\.cgi|wp-admin|wp-login|wp-content|\.git|\.env|\.htaccess|phpmyadmin|adminer|actuator|console|manager/html|solr|struts|jenkins|config\.json|\.DS_Store|Thumbs\.db|web\.config|autodiscover|owa/auth|CSCOE).*" (400|403|404|405|500)
            ^<HOST> -.*"(GET|POST|HEAD).*/\.\."
            ^<HOST> -.*"(GET|POST|HEAD).*\.(sql|bak|backup|old|orig|swp|save).*"
            ^<HOST> -.*"(GET|POST|HEAD).*(union|select|insert|update|delete|drop|create|alter|truncate).*"
            ^<HOST> -.*"(GET|POST|HEAD).*(/etc/passwd|/etc/shadow|/proc/self).*"

ignoreregex =

# Date format in nginx logs
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^\[]*\[({DATE})
              {^LN-BEG}
