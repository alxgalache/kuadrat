# Fail2ban filter for Remote Code Execution (RCE) attempts
# Copy to /etc/fail2ban/filter.d/kuadrat-rce-attempt.conf

[Definition]

# Match requests with RCE payloads
failregex = ^<HOST> -.*"(GET|POST|PUT|PATCH).*(__proto__|constructor\[|prototype\[).*"
            ^<HOST> -.*"(GET|POST|PUT|PATCH).*(curl\s|wget\s|bash\s|/bin/sh|/bin/bash|eval\(|exec\().*"
            ^<HOST> -.*"(GET|POST|PUT|PATCH).*(gsocket|/dev/tcp|/dev/udp|nc\s-e|netcat).*"
            ^<HOST> -.*"(GET|POST|PUT|PATCH).*(powershell|cmd\.exe|\$\(|\`).*"
            ^<HOST> -.*"(GET|POST|PUT|PATCH).*(child_process|require\(|import\().*"
            ^<HOST> -.*"(GET|POST|PUT|PATCH).*(\|\s*bash|\|\s*sh|&&\s*rm|;\s*rm).*"

ignoreregex =

datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^\[]*\[({DATE})
              {^LN-BEG}
